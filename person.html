<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personalização | Natasha Eyewear</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: #f8f9fa;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
      background: white;
      border-bottom: 1px solid #ddd;
    }

    .icons i {
      margin-left: 15px;
      cursor: pointer;
    }

    .custom-box {
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .preview {
      text-align: center;
    }

    .preview img {
      max-width: 100%;
      transition: 0.3s;
    }

    .color-option {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: inline-block;
      cursor: pointer;
      margin-right: 10px;
      border: 2px solid #ccc;
    }

    .color-option.active {
      border: 3px solid black;
    }

    .btn-custom {
      background: black;
      color: white;
      border-radius: 30px;
      padding: 10px 25px;
      border: none;
    }

    .btn-custom:hover {
      background: #333;
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <div>
      <strong>Natasha Eyewear®</strong>
    </div>

    <div class="icons">
      <i class="fa-solid fa-magnifying-glass"></i>
      <i class="fa-regular fa-user"></i>
      <i class="fa-solid fa-cart-shopping"></i>
    </div>
  </div>

  <!-- CONTEÚDO -->
  <div class="container my-5">
    <div class="row">

      <!-- CONFIGURAÇÕES -->
      <div class="col-md-6">
        <div class="custom-box">
          <h3>Personalize seu óculos</h3>

          <label class="mt-3">Modelo</label>
          <select class="form-select" id="modelo">
            <option value="img1.jpg">Óculos de Sol</option>
            <option value="img2.jpg">Anti Luz Azul</option>
            <option value="img3.jpg">Esportivo</option>
          </select>

          <label class="mt-3">Cor da Armação</label>
          <div>
            <span class="color-option" style="background:black" onclick="mudarCor('black')"></span>
            <span class="color-option" style="background:brown" onclick="mudarCor('brown')"></span>
            <span class="color-option" style="background:gold" onclick="mudarCor('gold')"></span>
          </div>

          <label class="mt-3">Tipo de Lente</label>
          <select class="form-select" id="lente">
            <option value="normal">Normal</option>
            <option value="blue">Filtro Azul</option>
            <option value="dark">Escura</option>
          </select>

          <button class="btn-custom mt-4 w-100">Adicionar ao Carrinho</button>
        </div>
      </div>

      <!-- PREVIEW -->
      <div class="col-md-6 preview">
        <h4>Pré-visualização</h4>
        <img id="previewImg" src="img1.jpg">
      </div>

    </div>
  </div>

  <script>
    const preview = document.getElementById('previewImg');

    document.getElementById('modelo').addEventListener('change', function() {
      preview.src = this.value;
    });

    function mudarCor(cor) {
      preview.style.filter = `drop-shadow(0 0 10px ${cor})`;
    }
  </script>

</body>
</html>
